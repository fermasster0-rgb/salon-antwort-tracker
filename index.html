<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Antwort-Tracker · Salon-Leads</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400..600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0E0F13;--panel:#171922;--panel-2:#1E212C;--line:#282C39;
    --text:#E7E9EF;--muted:#8A90A2;--green:#3FCF8E;--amber:#F5B454;
    --gray:#6B7180;--accent:#7C9CFF;
    --sans:"Inter",system-ui,-apple-system,"Segoe UI",sans-serif;
    --serif:"Fraunces",Georgia,serif;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:var(--sans);background:var(--bg);color:var(--text);line-height:1.6;padding:clamp(20px,4vw,48px);min-height:100vh}
  .wrap{max-width:900px;margin:0 auto}
  header{display:flex;justify-content:space-between;align-items:flex-end;flex-wrap:wrap;gap:1rem;margin-bottom:2rem;padding-bottom:1.6rem;border-bottom:1px solid var(--line)}
  header h1{font-family:var(--serif);font-weight:500;font-size:clamp(1.7rem,4vw,2.4rem);line-height:1.1}
  header h1 span{color:var(--accent)}
  header .sub{color:var(--muted);font-size:.9rem;margin-top:.3rem}
  .checked{text-align:right;font-size:.82rem;color:var(--muted)}
  .checked b{color:var(--text);font-weight:500}
  .live{display:inline-flex;align-items:center;gap:.4rem;font-size:.72rem;color:var(--green);margin-top:.35rem}
  .live i{width:7px;height:7px;border-radius:50%;background:var(--green);display:inline-block;animation:pulse 2s infinite}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
  .stats{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:1.8rem}
  .stat{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:1.1rem 1.3rem}
  .stat .n{font-family:var(--serif);font-size:2rem;line-height:1}
  .stat .l{font-size:.78rem;color:var(--muted);letter-spacing:.04em;margin-top:.3rem}
  .stat.g .n{color:var(--green)}.stat.a .n{color:var(--amber)}.stat.x .n{color:var(--gray)}
  .list{display:flex;flex-direction:column;gap:12px}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:1.1rem 1.3rem;display:flex;align-items:center;gap:1rem;flex-wrap:wrap;transition:border-color .2s,background .2s}
  .card:hover{background:var(--panel-2)}
  .card.replied{border-color:rgba(63,207,142,.4)}
  .card .main{flex:1;min-width:180px}
  .card .name{font-weight:600;font-size:1.05rem}
  .card .meta{font-size:.84rem;color:var(--muted);margin-top:.15rem}
  .card .meta a{color:var(--accent);text-decoration:none}
  .card .meta a:hover{text-decoration:underline}
  .pill{font-size:.78rem;font-weight:500;padding:.4rem .9rem;border-radius:100px;white-space:nowrap;display:inline-flex;align-items:center;gap:.45rem}
  .pill::before{content:"";width:8px;height:8px;border-radius:50%;background:currentColor}
  .pill.replied{color:var(--green);background:rgba(63,207,142,.12)}
  .pill.sent{color:var(--amber);background:rgba(245,180,84,.12)}
  .pill.draft{color:var(--accent);background:rgba(124,156,255,.12)}
  .pill.none{color:var(--gray);background:rgba(107,113,128,.12)}
  .card .date{font-size:.8rem;color:var(--muted);min-width:96px;text-align:right}
  footer{margin-top:2rem;padding-top:1.4rem;border-top:1px solid var(--line);font-size:.8rem;color:var(--muted);display:flex;justify-content:space-between;flex-wrap:wrap;gap:.6rem}
  .legend{display:flex;gap:1.2rem;flex-wrap:wrap}
  .legend span{display:inline-flex;align-items:center;gap:.4rem}
  .legend i{width:9px;height:9px;border-radius:50%;display:inline-block}
  @media(max-width:560px){.stats{grid-template-columns:1fr 1fr}.card .date{text-align:left;min-width:0}}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div>
      <h1>Antwort-<span>Tracker</span></h1>
      <div class="sub">Wer von den Salon-Leads hat schon geantwortet?</div>
    </div>
    <div class="checked">
      Zuletzt geprüft:<br><b id="checked-at">…</b>
      <div class="live"><i></i>live · aktualisiert alle 4 h</div>
    </div>
  </header>
  <div class="stats">
    <div class="stat g"><div class="n" id="s-replied">0</div><div class="l">Geantwortet</div></div>
    <div class="stat a"><div class="n" id="s-sent">0</div><div class="l">Gesendet · wartet</div></div>
    <div class="stat x"><div class="n" id="s-none">0</div><div class="l">Noch offen</div></div>
  </div>
  <div class="list" id="list"></div>
  <footer>
    <div class="legend">
      <span><i style="background:#3FCF8E"></i>Geantwortet</span>
      <span><i style="background:#F5B454"></i>Gesendet</span>
      <span><i style="background:#7C9CFF"></i>Entwurf fertig</span>
      <span><i style="background:#6B7180"></i>Offen</span>
    </div>
    <div>Daten kommen automatisch vom 4-Stunden-Agenten.</div>
  </footer>
</div>

<script>
  // Fallback, falls data.json (noch) nicht geladen werden kann (z. B. lokal per Doppelklick)
  const FALLBACK = {
    lastChecked: "noch nicht geprüft",
    leads: [
      { name:"Exquisite Hair & Beauty", email:"office@exquisite-styles.at", status:"sent", date:"04.07.2026" },
      { name:"Hair & Beauty by Azra",   email:"kasmin_azra@hotmail.de",     status:"none", date:"" },
      { name:"ultimativgroup (1180)",   email:"salon1180@ultimativgroup.at",status:"none", date:"" },
      { name:"Haarmacherei Wien",       email:"office@haarmacherei.at",     status:"none", date:"" },
      { name:"Michael's Friseur",       email:"office@michaels.wien",       status:"none", date:"" }
    ]
  };
  const LABELS = {
    replied:{txt:"Geantwortet",cls:"replied"},
    sent:{txt:"Gesendet",cls:"sent"},
    draft:{txt:"Entwurf fertig",cls:"draft"},
    none:{txt:"Noch offen",cls:"none"}
  };

  function render(leads, lastChecked){
    document.getElementById("checked-at").textContent = lastChecked || "—";
    const listEl = document.getElementById("list");
    listEl.innerHTML = "";
    let c = {replied:0,sent:0,none:0};
    leads.forEach(l=>{
      if(l.status==="replied")c.replied++;
      else if(l.status==="sent")c.sent++;
      else c.none++;
      const L = LABELS[l.status]||LABELS.none;
      const el = document.createElement("div");
      el.className = "card"+(l.status==="replied"?" replied":"");
      el.innerHTML =
        '<div class="main"><div class="name">'+l.name+'</div>'+
        '<div class="meta"><a href="mailto:'+l.email+'">'+l.email+'</a></div></div>'+
        '<span class="pill '+L.cls+'">'+L.txt+'</span>'+
        '<div class="date">'+(l.date||"—")+'</div>';
      listEl.appendChild(el);
    });
    document.getElementById("s-replied").textContent=c.replied;
    document.getElementById("s-sent").textContent=c.sent;
    document.getElementById("s-none").textContent=c.none;
  }

  async function load(){
    try{
      const res = await fetch("data.json?t="+Date.now(), {cache:"no-store"});
      if(!res.ok) throw new Error("no data");
      const d = await res.json();
      render(d.leads, d.lastChecked);
    }catch(e){
      render(FALLBACK.leads, FALLBACK.lastChecked);
    }
  }
  load();
  // alle 5 Minuten frische Daten holen, solange die Seite offen ist
  setInterval(load, 5*60*1000);
</script>
</body>
</html>
